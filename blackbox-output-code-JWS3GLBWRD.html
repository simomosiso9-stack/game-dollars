<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة جمع المال</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* تصميم ورقة النقود */
        .money-bill {
            width: 120px;
            height: 60px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 8px;
            margin: 0 auto 20px auto;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: float-bill 4s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        }

        @keyframes float-bill {
            0% { transform: rotate(0deg) translateY(0px); }
            50% { transform: rotate(5deg) translateY(-15px); }
            100% { transform: rotate(0deg) translateY(0px); }
        }

        .money-bill::before {
            content: "$";
            font-size: 40px;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .money-bill::after {
            content: "$";
            font-size: 20px;
            color: #fff;
            position: absolute;
            top: 5px;
            right: 5px;
            opacity: 0.7;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .score-board {
            font-size: 35px;
            margin: 25px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #2ecc71;
            font-weight: bold;
            display: inline-block;
            min-width: 150px;
        }

        #score {
            color: #2ecc71;
            margin-left: 5px;
        }

        .dollar-sign {
            color: #2ecc71;
            font-size: 30px;
            vertical-align: top;
        }

        #coin-btn {
            background: linear-gradient(to bottom, #f1c40f, #f39c12);
            color: #2c3e50;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 0 #d35400, 0 15px 20px rgba(0,0,0,0.4);
            outline: none;
        }

        #coin-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #d35400, 0 0 0 rgba(0,0,0,0.4);
        }

        #coin-btn:hover {
            filter: brightness(1.1);
        }

        .message {
            margin-top: 25px;
            font-size: 12px;
            color: #ecf0f1;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- رسمة ورقة النقود في الأعلى -->
        <div class="money-bill"></div>
        
        <h1>لعبة الأثرياء</h1>
        <p>اضغط لجمع المال!</p>
        
        <div class="score-board">
            <span id="score">0</span>
            <span class="dollar-sign">$</span>
        </div>

        <button id="coin-btn" onclick="addCoin()">اضغط هنا!</button>

        <p class="message">💰 هذه عملات وهمية للعبة فقط</p>
    </div>

    <script>
        let score = 0;

        function addCoin() {
            score++;
            document.getElementById('score').innerText = score;
            
            // تأثير بصري عند النقر
            const btn = document.getElementById('coin-btn');
            btn.style.transform = "scale(0.95)";
            setTimeout(() => {
                btn.style.transform = "scale(1)";
            }, 100);
        }
    </script>

</body>
</html>
